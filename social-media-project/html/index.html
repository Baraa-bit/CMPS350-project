<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tawasl</title>
    <link rel="stylesheet" href="../style/style.css" />
  </head>
  <body>
    <header id="page-header">
      <span id="logo">T</span>
    </header>
    <main id="login-main">
      <section id="home-img-section">
        <span id="title">Tawasl</span>
        <h1>Connect with the world through Tawasl</h1>
        <p>
          Share your thoughts, discover new ideas, and stay connected with
          friends and communities.
        </p>
      </section>
      <section id="login-section">
        <h1 id="login-title">Log into Tawasl</h1>
        <form action="">
          <div id="login-inputs">
            <input
              type="text"
              class="input-field"
              placeholder="Enter your Email"
            />
            <input
              type="password"
              class="input-field"
              placeholder="Enter your Password"
            />
            <button type="button" class="button">Log In</button>
            <p id="signUp-link">don't have an account?</p>
            <button type="button" class="button">Sign Up</button>
          </div>
        </form>
      </section>
    </main>
    <footer></footer>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tawasl - News Feed</title>
    <link rel="stylesheet" href="../style/style.css" />
    <link rel="stylesheet" href="../style/feed-post.css" />
    <style>
      /* Fix for the white boxes around nav links */
      #main-nav li { background-color: transparent; }
    </style>
  </head>
  <body>
    <header id="page-header-with-logo">
      <span id="logo">T</span>
      <nav id="main-nav">
        <ul>
          <li><a href="feed.html" class="active">News Feed</a></li>
          <li><a href="profile.html">Profile</a></li>
        </ul>
      </nav>
      <button id="logout-btn" type="button">Logout</button>
    </header>
    <main id="feed-main">
      <section id="create-post">
        <form id="create-post-form">
          <textarea id="post-input" placeholder="What's on your mind?" required></textarea>
          <button type="submit" id="submit-post-btn">Post</button>
        </form>
      </section>
      <section id="posts-stream"></section>
    </main>
    <footer>
      <p>
        Tawasl is a simple social platform project created to help people
        connect and share ideas online.
      </p>
      <div id="social-media">
        <h4>Social media</h4>
        <div class="social-icon">
          <a href="https://www.facebook.com/">
            <img src="../assets/icons/brand-facebook.svg" />
            <p>Facebook</p>
          </a>
        </div>
        <div class="social-icon">
          <a href="https://www.instagram.com/?hl=en">
            <img src="../assets/icons/brand-instagram.svg" />
            <p>Instagram</p>
          </a>
        </div>
        <div class="social-icon">
          <a href="https://x.com/">
            <img src="../assets/icons/brand-x.svg" />
            <p>Twitter</p>
          </a>
        </div>
      </div>
      <div id="Contact-us">
        <h4>Contact Us</h4>
        <p>Email: info@tawasl.com</p>
        <p>Phone: +974 5555 1234</p>
        <p>Doha, Qatar</p>
      </div>
      <p id="copyrights">&copy; 2026 Tawasl. Connecting people everywhere.</p>
    </footer>
    <script src="../js/feed.js"></script>
  </body>
</html>
